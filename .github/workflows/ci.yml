name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python syntax check
        run: |
          python3 -m py_compile fetch_repos.py
          echo "✓ Python syntax OK"

      - name: Validate JSON structure
        run: |
          python3 -c "
          import json
          with open('repodata.json') as f:
              data = json.load(f)
          assert 'fetched_at' in data, 'Missing fetched_at key'
          assert 'repos' in data, 'Missing repos key'
          assert 'total' in data, 'Missing total key'
          assert 'total_categories' in data, 'Missing total_categories key'
          repos = data['repos']
          print(f'✓ {data[\"total_categories\"]} categories, {data[\"total\"]} repos')
          print(f'✓ Last fetched: {data[\"fetched_at\"]}')
          # Validate each repo has required fields
          for r in repos:
              assert 'name' in r, f'Repo missing name: {r}'
              assert 'html_url' in r, f'Repo missing html_url: {r.get(\"name\",\"?\")}'
              assert 'stars' in r, f'Repo missing stars: {r.get(\"name\",\"?\")}'
          print(f'✓ All {len(repos)} repo records valid')
          "

      - name: HTML structure check
        run: |
          python3 -c "
          with open('index.html') as f:
              html = f.read()
          assert '<!DOCTYPE html>' in html, 'Missing DOCTYPE'
          assert '</html>' in html, 'Missing closing html'
          assert 'chart.js' in html.lower() or 'Chart' in html, 'Missing Chart.js reference'
          print(f'✓ HTML file valid ({len(html)} bytes)')
          "

      - name: Check .gitignore
        run: |
          python3 -c "
          with open('.gitignore') as f:
              content = f.read()
          required = ['repohub.db', 'fetch.log', '.env']
          for r in required:
              assert r in content, f'.gitignore missing: {r}'
          print(f'✓ .gitignore covers {len(content.split(chr(10)))} entries')
          "
